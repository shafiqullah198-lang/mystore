{% extends 'base.html' %}
{% block content %}

<h2>Edit Stock</h2>

<form method="POST">
    {% csrf_token %}

    <label>Product</label>
    <input type="text" value="{{ product.name }}" disabled>

    <label>Stock</label>
    <input type="number" name="stock" value="{{ product.stock }}">

    <button type="submit">Update</button>
</form>

{% endblock %}
